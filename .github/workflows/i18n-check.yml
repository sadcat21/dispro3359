name: i18n check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  i18n:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run i18n hardcoded-strings check
        run: node scripts/check-i18n.mjs
